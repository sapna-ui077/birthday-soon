<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Gallery ❤️</title>

<link rel="stylesheet" href="css/gallery.css">
<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="stars"></div>

<section class="gallery">

<h1>📸 Beautiful Moments</h1>

<p>Tap each card to reveal a beautiful memory ❤️</p>

<div class="cards">

<div class="memory">
<div class="cover">❤️ Tap to Reveal ❤️</div>
<img src="images/photo1.jpg.jpeg" alt="Photo 1">
</div>

<div class="memory">
<div class="cover">❤️ Tap to Reveal ❤️</div>
<img src="images/photo2.jpg.jpeg" alt="Photo 2">
</div>

<div class="memory">
<div class="cover">❤️ Tap to Reveal ❤️</div>
<img src="images/photo3.jpg.jpeg" alt="Photo 3">
</div>

<div class="memory">
<div class="cover">❤️ Tap to Reveal ❤️</div>
<img src="images/photo4.jpg.jpeg" alt="Photo 4">
</div>

<div class="memory">
<div class="cover">❤️ Tap to Reveal ❤️</div>
<img src="images/photo5.jpg.jpeg" alt="Photo 5">
</div>

</div>

<br>

<a href="reasons.html" class="btn">
Continue ❤️
</a>

</section>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="music/birthday.mp3" type="audio/mpeg">
</audio>

<script>

// Music
const bgMusic = document.getElementById("bgMusic");

document.addEventListener("click", function () {
    bgMusic.play().catch(() => {});
}, { once: true });

// Tap to Reveal
const cards = document.querySelectorAll(".memory");

cards.forEach(card => {
    card.addEventListener("click", () => {
        card.classList.toggle("open");
    });
});

</script>

</body>
</html>
